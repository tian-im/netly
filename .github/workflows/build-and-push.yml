# ─────────────────────────────────────────────────────────────────
# Netly Ledger — Build & Push to GHCR
# ─────────────────────────────────────────────────────────────────
# Automatically builds and pushes the production Docker image to
# GitHub Container Registry (ghcr.io) after CI passes on main.
#
# Trigger chain:
#   1. Push/PR to main → test-coverage.yml runs (quality gate)
#   2. test-coverage.yml passes on main → this workflow fires
#   3. Image is built, tagged, and pushed to ghcr.io
#
# Tags pushed:
#   - latest          (always points to most recent main build)
#   - <version>       (from VERSION file, e.g. 1.0.1)
#   - sha-<short-sha> (for traceability back to exact commit)
#
# Manual runs also supported via workflow_dispatch.
# ─────────────────────────────────────────────────────────────────

name: Build & Push

on:
  # ── Automated: only after test-coverage passes on main ──
  workflow_run:
    workflows: ["Test & Coverage"]
    types: [completed]
    branches: [main]

  # ── Manual: trigger from the Actions UI (bypasses CI gate) ──
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Override version tag (leave empty to use VERSION file)'
        type: string
        default: ''
        required: false

# Only proceed if the triggering workflow succeeded (or manual dispatch)
# WHY: workflow_run fires on every completion (success/failure/cancelled).
# We gate on success so a broken build is never pushed.
jobs:
  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Only run if triggered manually, OR if the CI workflow succeeded
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write      # Required for pushing to GHCR

    steps:
      # ── Checkout the correct commit ──
      # workflow_run events carry the head SHA of the triggering workflow
      # run. workflow_dispatch uses the default branch HEAD.
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      # ── Set up QEMU for cross-platform emulation ──
      # WHY: The production image targets linux/amd64 and linux/arm64
      # so it runs on both x86 servers and ARM devices (e.g. Raspberry Pi).
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # ── Set up Docker Buildx ──
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Login to GitHub Container Registry ──
      # Uses the auto-generated GITHUB_TOKEN — no secrets to configure.
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Extract version and compute tags ──
      # Reads VERSION file for the semantic version tag. Falls back to
      # the manual override input if provided (workflow_dispatch).
      - name: Compute image tags
        id: meta
        run: |
          if [ -n "${{ github.event.inputs.version_override }}" ]; then
            VERSION="${{ github.event.inputs.version_override }}"
          else
            VERSION=$(cat VERSION)
          fi
          SHA_SHORT=$(echo "${{ github.event.workflow_run.head_sha || github.sha }}" | cut -c1-7)
          IMAGE="ghcr.io/${{ github.repository_owner }}/netly-ledger"

          echo "image=${IMAGE}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "sha_short=${SHA_SHORT}" >> $GITHUB_OUTPUT

          # WHY: We push three tags so consumers can pin to a specific
          # version, track a specific commit, or float on latest.
          TAGS="${IMAGE}:latest,${IMAGE}:${VERSION},${IMAGE}:sha-${SHA_SHORT}"
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT

          echo "Image:     ${IMAGE}"
          echo "Version:   ${VERSION}"
          echo "SHA:       ${SHA_SHORT}"
          echo "Tags:      ${TAGS}"

      # ── Build and push the production image ──
      # Uses the multi-stage Dockerfile. GitHub Actions cache is used
      # for Docker layers to speed up subsequent builds.
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Summary ──
      - name: Print summary
        run: |
          echo "### 🚀 Image published to GHCR" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | Image |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | ----- |" >> $GITHUB_STEP_SUMMARY
          echo "| \`latest\` | \`${{ steps.meta.outputs.image }}:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| \`${{ steps.meta.outputs.version }}\` | \`${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| \`sha-${{ steps.meta.outputs.sha_short }}\` | \`${{ steps.meta.outputs.image }}:sha-${{ steps.meta.outputs.sha_short }}\` |" >> $GITHUB_STEP_SUMMARY
