# ─────────────────────────────────────────────────────────────────
# Netly Ledger — Build & Push to GHCR
# ─────────────────────────────────────────────────────────────────
# Automatically builds and pushes the production Docker image to
# GitHub Container Registry (ghcr.io) when VERSION changes on main.
#
# Trigger chain:
#   1. VERSION file is changed and pushed to main → this workflow fires
#   2. Image is built, tagged, and pushed to ghcr.io
#
# Manual runs (via workflow_dispatch) allow publishing without a VERSION change.
#
# Architecture:
#   Each platform (amd64, arm64) builds NATIVELY on its own runner
#   in parallel — NO QEMU emulation. A merge job then creates a
#   single multi-arch manifest pointing to both platform images.
#
#   WHY: QEMU-emulated builds (e.g. arm64 on x86) are 5-6x slower
#   and easily exceed GitHub's 30-minute timeout. Native runners
#   for both platforms eliminate this bottleneck entirely.
#
# Tags pushed:
#   - latest          (always points to most recent main build)
#   - <version>       (from VERSION file, e.g. 1.0.1)
#   - sha-<short-sha> (for traceability back to exact commit)
#
# Manual runs also supported via workflow_dispatch.
# ─────────────────────────────────────────────────────────────────

name: Build & Push

on:
  # ── Automated: only when VERSION file changes on push to main ──
  # WHY: Publishing a new image should be an explicit decision —
  # bumping the VERSION file is the canonical signal to cut a release.
  # This avoids building/pushing on every main push.
  push:
    branches: [main]
    paths:
      - 'VERSION'

  # ── Manual: trigger from the Actions UI (no VERSION change needed) ──
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Override version tag (leave empty to use VERSION file)'
        type: string
        default: ''
        required: false

jobs:
  # ──────────────────────────────────────────────────────────────
  # Compute tags once (shared by all downstream jobs)
  # ──────────────────────────────────────────────────────────────
  meta:
    name: Compute tags
    runs-on: ubuntu-latest
    timeout-minutes: 1
    # WHY: The only triggers are workflow_dispatch and push (VERSION change),
    # so the meta job always runs. The condition exists for future trigger additions.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'push' }}
    outputs:
      image: ${{ steps.tags.outputs.image }}
      version: ${{ steps.tags.outputs.version }}
      sha_short: ${{ steps.tags.outputs.sha_short }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Compute image tags
        id: tags
        run: |
          if [ -n "${{ github.event.inputs.version_override }}" ]; then
            VERSION="${{ github.event.inputs.version_override }}"
          else
            VERSION=$(cat VERSION)
          fi
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE="ghcr.io/${{ github.repository_owner }}/netly-ledger"

          echo "image=${IMAGE}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "sha_short=${SHA_SHORT}" >> $GITHUB_OUTPUT

          echo "Image:     ${IMAGE}"
          echo "Version:   ${VERSION}"
          echo "SHA:       ${SHA_SHORT}"

  # ──────────────────────────────────────────────────────────────
  # Build each platform NATIVELY (no QEMU) in parallel
  # ──────────────────────────────────────────────────────────────
  # WHY: Using native ARM64 runners (ubuntu-24.04-arm) instead of
  # QEMU emulation cuts build time from 30+ minutes to ~8 minutes.
  # Each platform also gets its own cache scope to avoid the
  # "Unable to reserve cache" contention error.
  build:
    name: Build (${{ matrix.arch }})
    needs: meta
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # WHY: `cache-to/from` uses arch-specific scopes so the two
      # parallel builds don't fight over the same cache key.
      - name: Build and push (${{ matrix.arch }})
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ needs.meta.outputs.image }}:sha-${{ needs.meta.outputs.sha_short }}-${{ matrix.arch }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

  # ──────────────────────────────────────────────────────────────
  # Merge platform images into a single multi-arch manifest
  # ──────────────────────────────────────────────────────────────
  # WHY: docker buildx imagetools create assembles a manifest list
  # that points to both the amd64 and arm64 images. Users pulling
  # a single tag (e.g. :latest) automatically get the correct
  # platform image for their architecture.
  merge:
    name: Merge manifests
    needs: [meta, build]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      packages: write

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        run: |
          IMAGE="${{ needs.meta.outputs.image }}"
          SHA="${{ needs.meta.outputs.sha_short }}"
          VERSION="${{ needs.meta.outputs.version }}"

          docker buildx imagetools create \
            -t "${IMAGE}:latest" \
            -t "${IMAGE}:${VERSION}" \
            -t "${IMAGE}:sha-${SHA}" \
            "${IMAGE}:sha-${SHA}-amd64" \
            "${IMAGE}:sha-${SHA}-arm64"

          echo "### 🚀 Multi-arch image published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | Image |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | ----- |" >> $GITHUB_STEP_SUMMARY
          echo "| \`latest\` | \`${IMAGE}:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| \`${VERSION}\` | \`${IMAGE}:${VERSION}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| \`sha-${SHA}\` | \`${IMAGE}:sha-${SHA}\` |" >> $GITHUB_STEP_SUMMARY
