# ─────────────────────────────────────────────────────────────────
# Netly Ledger — Docker Production Build Test
# ─────────────────────────────────────────────────────────────────
# Runs automatically on every PR to main, on every push to main,
# and can also be triggered manually via workflow_dispatch.
#
# This workflow validates that the production Docker image builds
# successfully using the multi-stage Dockerfile. It also performs
# a quick smoke test: start the container, wait for the health
# check to pass, then tear down.
#
# Use this to catch Docker-specific issues (missing files, broken
# stages, entrypoint failures) BEFORE merging and before the
# build-and-push workflow publishes an image.
#
# Iteration workflow when fixing Docker build issues:
#   1. Push your changes to a feature branch
#   2. Go to Actions → Docker Build Test → Run workflow
#   3. Select your branch, enable multi-platform, and run
#   4. Iterate until green — no push to GHCR, no VERSION bumps
#
# Related: test-coverage.yml (quality gate), build-and-push.yml
# ─────────────────────────────────────────────────────────────────

name: Docker Build Test

on:
  # ── Automatic: every PR and push to main (native platform only, fast) ──
  pull_request:
    branches: [main]
  push:
    branches: [main]

  # ── Manual: trigger from the Actions UI on any branch ──
  # WHY: When iterating on Docker build fixes, use workflow_dispatch from
  # a feature branch. Enable multi-platform to verify the full production
  # build (linux/amd64 + linux/arm64) without pushing to GHCR.
  workflow_dispatch:
    inputs:
      multi_platform:
        description: 'Build for both linux/amd64 and linux/arm64? (2 jobs, ~10 min)'
        type: boolean
        default: false
        required: false
      smoke_test:
        description: 'Run smoke test (start container & check health)?'
        type: boolean
        default: true
        required: false

jobs:
  # ── Native single-platform build (fast path for PRs) ──
  build-native:
    name: Build (native)
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.multi_platform != 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build production Docker image
        run: docker compose -f docker-compose.prod.yml build

      - name: Smoke test (start → health check → stop)
        if: ${{ github.event.inputs.smoke_test != 'false' }}
        run: |
          mkdir -p ./netly-data && chmod 777 ./netly-data
          echo "=== Starting production container ==="
          docker compose -f docker-compose.prod.yml up --detach --wait --wait-timeout 90
          echo "=== Container is healthy! ==="
          docker compose -f docker-compose.prod.yml ps
          echo "=== Checking logs for errors ==="
          docker compose -f docker-compose.prod.yml logs --tail 50
          echo "=== Tearing down ==="
          docker compose -f docker-compose.prod.yml down --volumes --remove-orphans

      - name: Ensure cleanup
        if: always()
        run: docker compose -f docker-compose.prod.yml down --volumes --remove-orphans 2>/dev/null || true

  # ── Multi-platform build (manual dispatch, uses native ARM runner) ──
  # WHY: Each platform builds on its native architecture — amd64 on
  # ubuntu-latest, arm64 on ubuntu-24.04-arm. No QEMU, no timeout.
  # Cache scopes are platform-specific to avoid reservation conflicts.
  build-multi:
    name: Build (${{ matrix.arch }})
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.multi_platform == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build (${{ matrix.arch }}) — verify only, no push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: false
          cache-from: type=gha,scope=${{ matrix.arch }}-test
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}-test
